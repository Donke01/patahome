<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin — PataHome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --violet:#0d5c44; --violet-dark:#093f2f; --violet-light:#ecf4f0;
    --ink:#1a2420; --muted:#5f6d66; --line:#e3e9e5; --bg:#fbfcfb;
    --orange:#c19a4b; --card:#fff; --red:#b3413a;
    --shadow:0 1px 3px rgba(16,40,30,.06), 0 6px 20px rgba(16,40,30,.06);
    --serif:'Fraunces',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  html,body{overflow-x:clip;max-width:100%}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @view-transition{navigation:auto}
  @keyframes vtOut{to{opacity:0;transform:translateX(-26px)}}
  @keyframes vtIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
  ::view-transition-old(root){animation:vtOut .26s ease both}
  ::view-transition-new(root){animation:vtIn .34s cubic-bezier(.16,1,.3,1) both}
  @media(prefers-reduced-motion:reduce){::view-transition-old(root),::view-transition-new(root){animation:none}}

  header{position:sticky;top:0;z-index:100;background:#0d1512;color:#fff;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .logo{font-weight:800;font-size:1.2rem;font-family:var(--serif)}
  .logo b{color:var(--orange)}
  .logo .tag{font-size:.7rem;background:var(--orange);border-radius:999px;padding:2px 10px;font-weight:800;margin-left:8px;vertical-align:middle}
  .header-right{margin-left:auto;display:flex;gap:10px;align-items:center;font-size:.85rem;flex-wrap:wrap;justify-content:flex-end;min-width:0}
  @media(max-width:640px){
    header{padding:10px 14px;gap:8px}
    #who{display:none}
    .header-right{gap:7px}
    .header-right .btn{padding:7px 11px;font-size:.76rem}
    .wrap{padding:18px 14px 50px}
  }
  .btn{border:none;border-radius:10px;padding:8px 15px;font-weight:700;font-size:.85rem;transition:.15s}
  .btn-primary{background:var(--violet);color:#fff}
  .btn-primary:hover{background:var(--violet-dark)}
  .btn-ghost{background:transparent;color:var(--violet);border:1.5px solid var(--violet)}
  .btn-danger{background:transparent;color:var(--red);border:1.5px solid #e5b9b3}
  .btn-sm{padding:5px 11px;font-size:.76rem;border-radius:8px}
  .btn-white{background:#fff;color:#0d1512}

  .wrap{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
  .auth-card{max-width:380px;margin:10vh auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px;box-shadow:var(--shadow);animation:fadeUp .4s both}
  .auth-card h1{font-family:var(--serif);font-size:1.3rem;font-weight:600;color:var(--violet-dark)}
  .auth-card .sub{font-size:.84rem;color:var(--muted);margin-bottom:12px}
  label{display:block;font-size:.78rem;font-weight:700;color:var(--muted);margin:11px 0 4px}
  input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-size:.9rem;outline:none}
  input:focus{border-color:var(--violet)}
  .err{color:var(--red);font-size:.82rem;margin-top:10px;min-height:1.2em}

  .overview-head{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
  .overview-head h2{font-family:var(--serif);font-size:1.3rem;font-weight:600}
  @keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(13,92,68,.45)}50%{box-shadow:0 0 0 6px rgba(13,92,68,0)}}
  .live-pill{display:inline-flex;align-items:center;gap:7px;background:var(--violet-light);color:var(--violet);font-size:.72rem;font-weight:800;letter-spacing:1.2px;border-radius:999px;padding:5px 13px}
  .live-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--violet);animation:livePulse 1.8s infinite}
  .updated{font-size:.76rem;color:var(--muted);margin-left:auto}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);animation:fadeUp .4s both;position:relative;overflow:hidden}
  .stat::after{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--violet),var(--orange));opacity:0;transition:opacity .2s}
  .stat:hover::after{opacity:1}
  .stat .num{font-family:var(--serif);font-size:1.55rem;font-weight:600;color:var(--violet-dark)}
  .stat .lbl{font-size:.74rem;color:var(--muted)}
  .stat.rev .num{color:var(--orange)}
  .trend{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:800;border-radius:999px;padding:2px 8px;margin-left:8px;vertical-align:middle}
  .trend.up{background:var(--violet-light);color:var(--violet)}
  .trend.down{background:#faeeed;color:var(--red)}
  .trend.flat{background:#f0f2f1;color:var(--muted)}
  .panel-grid{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:22px}
  @media(max-width:800px){.panel-grid{grid-template-columns:1fr}}
  .chart-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);animation:fadeUp .4s both}
  .chart-card h3{font-family:var(--serif);font-size:.98rem;font-weight:600;margin-bottom:10px}
  .chart-card h3 small{font-family:'Inter',sans-serif;font-weight:500;color:var(--muted);font-size:.74rem;margin-left:8px}
  .chart-wrap{position:relative;height:200px}
  .hot-card{background:linear-gradient(150deg,#07281e,#0d5c44);color:#fff;border-radius:14px;padding:18px;box-shadow:var(--shadow);animation:fadeUp .4s both;display:flex;flex-direction:column;justify-content:center}
  .hot-card .hc-kick{font-size:.66rem;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:#d9c390;margin-bottom:8px}
  .hot-card .hc-title{font-family:var(--serif);font-size:1.05rem;font-weight:600;line-height:1.3}
  .hot-card .hc-sub{font-size:.8rem;opacity:.8;margin-top:8px}
  .hot-card .hc-num{font-family:var(--serif);font-size:1.9rem;color:#e3c98c;font-weight:600;margin-top:2px}

  .tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .tab{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:8px 18px;font-weight:700;font-size:.85rem;color:var(--muted)}
  .tab.on{background:var(--violet);border-color:var(--violet);color:#fff}

  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse;font-size:.85rem}
  th{background:var(--violet-light);color:var(--violet-dark);text-align:left;padding:10px 14px;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px}
  td{padding:10px 14px;border-top:1px solid var(--line);vertical-align:top}
  .muted{color:var(--muted);font-size:.78rem}
  .pill{display:inline-block;font-size:.68rem;font-weight:800;border-radius:999px;padding:2px 9px}
  .pill.ok{background:var(--violet-light);color:var(--violet-dark)}
  .pill.warn{background:#fff3e6;color:#b45309}
  .pill.feat{background:var(--orange);color:#fff}
  .table-scroll{overflow-x:auto}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:12px;font-size:.9rem;z-index:3000;opacity:0;transition:.3s}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<header>
  <span class="logo">Pata<b>Home</b><span class="tag">ADMIN</span></span>
  <div class="header-right" id="hdr" style="display:none">
    <span id="who"></span>
    <a class="btn btn-white" href="/" style="text-decoration:none">View Site</a>
    <button class="btn btn-primary" onclick="logout()">Log Out</button>
  </div>
</header>

<div id="authView">
  <div class="auth-card">
    <h1>Admin Access</h1>
    <div class="sub">This area is for the PataHome administrator only.</div>
    <label>Phone</label>
    <input id="aPhone" placeholder="07XXXXXXXX">
    <label>Password</label>
    <input id="aPass" type="password">
    <div class="err" id="authErr"></div>
    <button class="btn btn-primary" style="width:100%;padding:11px" onclick="login()">Log In</button>
  </div>
</div>

<div id="dash" class="wrap" style="display:none">
  <div class="overview-head">
    <h2>Platform Overview</h2>
    <span class="live-pill"><span class="dot"></span>LIVE</span>
    <span class="updated" id="updatedAgo"></span>
  </div>
  <div class="stats" id="stats"></div>
  <div class="panel-grid">
    <div class="chart-card">
      <h3>Platform activity<small>last 30 days</small></h3>
      <div class="chart-wrap"><canvas id="actChart"></canvas></div>
    </div>
    <div class="hot-card">
      <div class="hc-kick">Hottest This Week</div>
      <div class="hc-title" id="hcTitle">—</div>
      <div class="hc-sub">leads in the last 7 days</div>
      <div class="hc-num" id="hcLeads">0</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tabL" onclick="setTab('listings')">Listings</button>
    <button class="tab" id="tabU" onclick="setTab('users')">Users</button>
  </div>
  <div class="panel table-scroll" id="panel"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
let token=localStorage.getItem("ph_admin")||null, tab="listings", cache={};
const $=id=>document.getElementById(id);
const fmt=n=>"KES "+Number(n).toLocaleString("en-KE");
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2600)}

async function api(path,opts={}){
  const r=await fetch(path,{...opts,headers:{"Content-Type":"application/json",...(token?{Authorization:"Bearer "+token}:{})}});
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(d.error||"Request failed");
  return d;
}
async function login(){
  $("authErr").textContent="";
  try{
    const r=await api("/api/auth/login",{method:"POST",body:JSON.stringify({phone:$("aPhone").value.trim(),password:$("aPass").value})});
    token=r.token;
    await api("/api/admin/overview"); // verifies admin role
    localStorage.setItem("ph_admin",token);
    enter(r.user.name);
  }catch(e){token=null;$("authErr").textContent=e.message==="Admin access only"?"This account is not an admin.":e.message}
}
function logout(){token=null;localStorage.removeItem("ph_admin");location.reload()}

async function enter(name){
  $("authView").style.display="none";$("dash").style.display="block";$("hdr").style.display="flex";
  $("who").textContent=name||"Admin";
  await refresh();
}
let chart=null, lastUpdated=null;
async function refresh(){
  const [o,listings,users,stats]=await Promise.all([
    api("/api/admin/overview"),api("/api/admin/listings"),api("/api/admin/users"),
    api("/api/admin/stats").catch(()=>null)]);
  cache={listings,users};
  const t=stats?stats.trendPct:0;
  const trend=stats?(t>0?`<span class="trend up">▲ ${t}%</span>`:t<0?`<span class="trend down">▼ ${Math.abs(t)}%</span>`:`<span class="trend flat">— 0%</span>`):"";
  $("stats").innerHTML=`
    <div class="stat"><div class="num">${o.activeListings}</div><div class="lbl">Active listings</div></div>
    <div class="stat"><div class="num">${o.users}</div><div class="lbl">Registered users</div></div>
    <div class="stat"><div class="num">${o.verifiedOwners}</div><div class="lbl">Verified owners</div></div>
    <div class="stat"><div class="num">${o.totalLeads}${trend}</div><div class="lbl">Total leads</div></div>
    <div class="stat"><div class="num">${o.unrepliedInquiries}</div><div class="lbl">Unreplied inquiries</div></div>
    <div class="stat rev"><div class="num">${fmt(stats?stats.revenue:0)}</div><div class="lbl">Revenue (completed payments)</div></div>`;
  if(stats)renderLive(stats);
  lastUpdated=Date.now();tickUpdated();
  renderTab();
}
function renderLive(o){
  if(o.hotListing){$("hcTitle").textContent=o.hotListing.title;$("hcLeads").textContent=o.hotListing.leads}
  else{$("hcTitle").textContent="No leads this week yet";$("hcLeads").textContent="0"}
  renderChart(o.series);
}
function renderChart(series){
  if(typeof Chart==="undefined")return;
  const labels=series.map(x=>x.date.slice(5).replace("-","/"));
  const ds=[series.map(x=>x.leads),series.map(x=>x.inquiries),series.map(x=>x.listings)];
  if(chart){
    chart.data.labels=labels;
    ds.forEach((d,i)=>chart.data.datasets[i].data=d);
    chart.update("none");
    return;
  }
  const ctx=$("actChart").getContext("2d");
  const grad=ctx.createLinearGradient(0,0,0,200);
  grad.addColorStop(0,"rgba(13,92,68,.26)");grad.addColorStop(1,"rgba(13,92,68,0)");
  chart=new Chart(ctx,{
    type:"line",
    data:{labels,datasets:[
      {label:"Leads",data:ds[0],borderColor:"#0d5c44",backgroundColor:grad,fill:true,tension:.35,borderWidth:2.5,pointRadius:0,pointHoverRadius:5},
      {label:"Messages",data:ds[1],borderColor:"#c19a4b",fill:false,tension:.35,borderWidth:2,pointRadius:0,pointHoverRadius:5,borderDash:[5,4]},
      {label:"New listings",data:ds[2],borderColor:"#3d4b56",fill:false,tension:.35,borderWidth:1.5,pointRadius:0,pointHoverRadius:5,borderDash:[2,3]}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
      plugins:{legend:{position:"top",align:"end",labels:{boxWidth:10,boxHeight:10,usePointStyle:true,pointStyle:"circle",font:{family:"'Inter',sans-serif",size:11},color:"#5f6d66"}},
        tooltip:{backgroundColor:"#12201a",padding:10,cornerRadius:8}},
      scales:{
        x:{grid:{display:false},ticks:{maxTicksLimit:8,font:{size:10},color:"#8a968f"}},
        y:{beginAtZero:true,grid:{color:"rgba(0,0,0,.05)"},ticks:{precision:0,font:{size:10},color:"#8a968f"}}
      }
    }
  });
}
function tickUpdated(){
  if(!lastUpdated)return;
  const s=Math.round((Date.now()-lastUpdated)/1000);
  $("updatedAgo").textContent=s<5?"Updated just now":s<60?`Updated ${s}s ago`:`Updated ${Math.floor(s/60)}m ago`;
}
setInterval(tickUpdated,5000);
setInterval(()=>{if(token&&$("dash").style.display!=="none"&&!document.hidden)refresh().catch(()=>{})},30000);
document.addEventListener("visibilitychange",()=>{if(!document.hidden&&token&&$("dash").style.display!=="none")refresh().catch(()=>{})});
function setTab(t){
  tab=t;
  $("tabL").classList.toggle("on",t==="listings");
  $("tabU").classList.toggle("on",t==="users");
  renderTab();
}
function renderTab(){
  const CAT={rent:"Rent",sale:"Sale"};
  if(tab==="listings"){
    $("panel").innerHTML=`<table><tr><th>Listing</th><th>Owner</th><th>Price</th><th>Leads</th><th>Status</th><th></th></tr>`+
      cache.listings.map(x=>`<tr>
        <td><b>${esc(x.title)}</b> <span class="pill ok">${CAT[x.category]||x.category}</span><div class="muted">${esc(x.area)}, ${esc(x.county)} · #${x.id}</div></td>
        <td>${esc(x.ownerName)}<div class="muted">${esc(x.ownerPhone)}</div></td>
        <td>${fmt(x.price)}</td>
        <td><b>${x.leads}</b></td>
        <td><span class="pill ok">${x.status}</span></td>
        <td><button class="btn btn-danger btn-sm" onclick="removeListing(${x.id})">Remove</button></td>
      </tr>`).join("")+`</table>`;
  }else if(tab==="users"){
    $("panel").innerHTML=`<table><tr><th>User</th><th>Phone</th><th>Listings</th><th>Verified</th><th>Joined</th><th></th></tr>`+
      cache.users.map(u=>`<tr>
        <td><b>${esc(u.name)}</b>${u.role==="admin"?' <span class="pill feat">ADMIN</span>':""}</td>
        <td>${esc(u.phone)}</td>
        <td>${u.listings}</td>
        <td>${u.verified?`<span class="pill ok">✓ verified</span>`:`<span class="pill warn">unverified</span>`}</td>
        <td class="muted">${esc(u.created_at)}</td>
        <td>${u.role!=="admin"?`<button class="btn btn-ghost btn-sm" onclick="setVerified(${u.id},${u.verified?0:1})">${u.verified?"Unverify":"Verify ✓"}</button>`:""}</td>
      </tr>`).join("")+`</table>`;
  }
}
async function removeListing(id){
  if(!confirm("Remove listing #"+id+" from the site?"))return;
  try{await api("/api/listings/"+id,{method:"DELETE"});toast("Listing removed");await refresh()}
  catch(e){toast(e.message)}
}
async function setVerified(id,v){
  try{await api("/api/admin/users/"+id,{method:"PATCH",body:JSON.stringify({verified:v})});toast(v?"Owner verified ✓":"Verification removed");await refresh()}
  catch(e){toast(e.message)}
}

(async function(){
  if(token){
    try{const me=await api("/api/auth/me");await api("/api/admin/overview");return enter(me.name)}
    catch{token=null;localStorage.removeItem("ph_admin")}
  }
  $("authView").style.display="block";
})();
</script>
</body>
</html>
